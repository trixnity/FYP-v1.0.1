spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

stockfish.path=${STOCKFISH_PATH:/usr/games/stockfish}

puzzles.import.path=${PUZZLES_IMPORT_PATH:}

puzzle.vision.python=${PUZZLE_VISION_PYTHON:python}
puzzle.vision.script=${PUZZLE_VISION_SCRIPT:}
puzzle.vision.model=${PUZZLE_VISION_MODEL:}
puzzle.upload.storage-dir=${PUZZLE_UPLOAD_STORAGE_DIR:uploads/puzzle-library}
puzzle.ai.base-url=${PUZZLE_AI_BASE_URL:}
puzzle.recognition.storage-dir=${PUZZLE_RECOGNITION_STORAGE_DIR:uploads/puzzles}

stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.currency=${STRIPE_CURRENCY:myr}
stripe.success-url=${STRIPE_SUCCESS_URL:}
stripe.cancel-url=${STRIPE_CANCEL_URL:}
app.base-url=${APP_BASE_URL:}
