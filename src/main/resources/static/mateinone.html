<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mate in one</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <style>
    body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #f3f7ff; color: #0e1a2a; }
    header { padding: 16px 24px; background: #fff; border-bottom: 1px solid #dce6f7; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,46,121,0.08); }
    .wrap { max-width: 1100px; margin: 24px auto; padding: 16px; }
    .board-wrap { background: #fff; border: 1px solid #dce6f7; border-radius: 12px; padding: 16px; box-shadow: 0 10px 30px rgba(0,46,121,0.08); }
    .controls { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    button { border: none; padding: 10px 14px; border-radius: 10px; cursor: pointer; font-weight: 600; }
    .primary { background: linear-gradient(135deg, #1d72f3, #48b1ff); color: #fff; }
    .ghost { background: #eef3ff; color: #0e1a2a; border: 1px solid #dce6f7; }
  </style>
</head>
<body>
  <header>
    <div style="font-weight:700;">Mate in one</div>
    <nav><a href="puzzle.html" style="color:#1d72f3; text-decoration:none; font-weight:600;">Back to themes</a></nav>
  </header>

  <div class="wrap">
    <div class="board-wrap">
      <div id="board" style="width: 420px; max-width: 100%; margin: 0 auto;"></div>
      <div class="controls">
        <button class="primary" id="next">Next</button>
        <button class="ghost" id="reset">Reset</button>
      </div>
      <div id="status" style="margin-top:10px; color:#5c6b80;">White to move</div>
    </div>
  </div>

  <script src="https://unpkg.com/chess.js@1.0.0/chess.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <script>
    const puzzles = [
      { fen: "1k6/8/QK6/8/8/8/8/8 w - - 0 1", side: "w", solution: ["a6b7"] },
      { fen: "6k1/5ppp/8/8/8/3Q4/5PPP/6K1 w - - 0 1", side: "w", solution: ["Qd8#"] },
      { fen: "5rk1/5ppp/8/8/8/8/5PPP/5RK1 w - - 0 1", side: "w", solution: ["Re1#"] }
    ];
    let idx = 0;
    let game = new Chess(puzzles[idx].fen);
    let board = Chessboard('board', {
      position: puzzles[idx].fen,
      orientation: puzzles[idx].side === 'b' ? 'black' : 'white',
      draggable: true,
      onDrop: (source, target) => {
        const move = game.move({ from: source, to: target, promotion: 'q' });
        if (!move) return 'snapback';
        const sol = puzzles[idx].solution[0].toLowerCase();
        const uci = (move.from + move.to + (move.promotion || '')).toLowerCase();
        if (uci === sol) {
          document.getElementById('status').textContent = 'Solved! Click Next.';
        } else {
          game.undo(); board.position(game.fen()); document.getElementById('status').textContent = 'Try again.';
          return 'snapback';
        }
      }
    });
    document.getElementById('reset').onclick = () => { game = new Chess(puzzles[idx].fen); board.position(puzzles[idx].fen); document.getElementById('status').textContent = 'Reset. White to move.'; };
    document.getElementById('next').onclick = () => { idx = (idx + 1) % puzzles.length; game = new Chess(puzzles[idx].fen); board.orientation(puzzles[idx].side === 'b' ? 'black' : 'white'); board.position(puzzles[idx].fen); document.getElementById('status').textContent = 'White to move.'; };
  </script>
</body>
</html>
