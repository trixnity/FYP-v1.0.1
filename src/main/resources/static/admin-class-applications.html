<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduChess - Class Applications</title>
  <link rel="stylesheet" href="css/shell.css">
  <style>
    :root{--bg:#081018;--panel:rgba(13,22,34,.88);--panel2:rgba(20,31,45,.9);--text:#f8fafc;--muted:#aeb8c7;--accent:#82bd4a;--accent2:#f3c75d;--stroke:rgba(198,211,229,.16)}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:"Segoe UI",system-ui,sans-serif;color:var(--text);background:linear-gradient(90deg,rgba(8,13,21,.95),rgba(15,24,36,.78),rgba(8,13,21,.95)),url("img/custom-chess/background.jpg") center bottom/cover fixed no-repeat,var(--bg)}
    .content{padding:24px;width:min(1280px,100%)} .topbar,.panel{background:linear-gradient(145deg,var(--panel2),var(--panel));border:1px solid var(--stroke);border-radius:12px;box-shadow:0 24px 54px rgba(0,0,0,.36)}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:16px;margin-bottom:16px;flex-wrap:wrap} h1,h2{margin:0}.muted{color:var(--muted)}
    .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}.toolbar select,.toolbar button,select{min-height:38px;border-radius:8px;border:1px solid var(--stroke);background:#1f2937;color:#f8fafc;padding:8px 10px;font:inherit;color-scheme:dark}
    select option{background:#111827;color:#f8fafc}
    select option:hover,select option:checked{background:#84cc16;color:#111827}
    button,.btn{min-height:38px;border-radius:8px;border:1px solid var(--stroke);background:rgba(255,255,255,.06);color:var(--text);padding:8px 12px;font-weight:800;cursor:pointer;text-decoration:none}.primary{background:linear-gradient(180deg,#94ca5c,#6ca340);color:#081207}.danger{color:#fecaca;border-color:rgba(248,113,113,.45)}
    .apps{display:grid;gap:12px}.app-card{padding:14px;border:1px solid var(--stroke);border-radius:10px;background:rgba(255,255,255,.045);display:grid;gap:12px}.app-head{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.app-title{font-weight:900;font-size:18px}.badge{display:inline-flex;align-items:center;min-height:26px;padding:4px 8px;border-radius:999px;background:rgba(130,189,74,.14);color:#d9ffae;font-size:12px;font-weight:900}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px}.kv{padding:9px;border:1px solid var(--stroke);border-radius:8px;background:rgba(255,255,255,.04)}.kv span{display:block;color:var(--muted);font-size:12px;font-weight:800;margin-bottom:3px}.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.actions select{min-width:220px}
    @media(max-width:900px){.shell{grid-template-columns:1fr}.content{padding:16px}}
  </style>
</head>
<body data-active-nav="class-applications">
<div class="shell">
  <aside class="sidebar"><a class="sidebar-logo" href="dashboard.html"><img src="logo.png" alt="">EduChess</a><nav class="sidebar-nav"></nav><div class="sidebar-footer"></div></aside>
  <main class="page-content"><div class="content">
    <div class="topbar"><div><h1>Class Applications</h1><div class="muted">Admin assignment queue for student chess class requests.</div></div><a class="btn" href="know-our-coaches.html">Coach Landing</a></div>
    <section class="panel" style="padding:16px;">
      <div class="toolbar">
        <label>Status <select id="statusFilter"><option value="">All</option><option>PENDING</option><option>ASSIGNED</option><option>APPROVED</option><option>REJECTED</option></select></label>
        <button class="primary" type="button" onclick="loadApplications()">Refresh</button>
      </div>
      <div class="muted" id="statusText">Loading...</div>
      <div class="apps" id="apps"></div>
    </section>
  </div></main>
</div>
<script src="js/role-nav.js"></script>
<script>
  const token = localStorage.getItem("authToken");
  if (!token) location.href = "index.html";
  const authHeaders = { Authorization: "Bearer " + token };
  const COACH_ORDER = ["Coach Hafiz","Coach Syazrin","Coach Ali","Coach Omar","Coach Syakir","Coach Nabil","Coach Amzar","Coach Yeng","Coach Ikmal"];
  let coaches = [];
  const esc = v => String(v ?? "").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
  const dt = v => v ? String(v).replace("T"," ").slice(0,16) : "-";
  async function loadCoaches(){
    const r=await fetch("/api/coaches");
    const data=r.ok?await r.json():[];
    coaches = COACH_ORDER
      .map(name => data.find(c => c.name === name))
      .filter(Boolean);
  }
  function coachOptions(selected=""){ return '<option value="">Choose final coach</option>' + coaches.map(c=>`<option value="${c.id}" ${String(c.id)===String(selected)?"selected":""}>${esc(c.name)}</option>`).join(""); }
  async function loadApplications(){
    const q = statusFilter.value ? `?status=${encodeURIComponent(statusFilter.value)}` : "";
    const res = await fetch(`/api/admin/class-applications${q}`, { headers: authHeaders });
    const data = await res.json().catch(()=>[]);
    if(!res.ok){ statusText.textContent = data.error || "Could not load applications."; return; }
    statusText.textContent = `${data.length} application(s)`;
    apps.innerHTML = data.length ? data.map(app => `
      <article class="app-card">
        <div class="app-head"><div><div class="app-title">${esc(app.studentName || "Student")}</div><div class="muted">${esc(app.email)} · ${esc(app.phone || "-")}</div></div><span class="badge">${esc(app.status)}</span></div>
        <div class="grid">
          <div class="kv"><span>Age</span>${esc(app.age || "-")}</div><div class="kv"><span>Level</span>${esc(app.chessLevel || "-")}</div>
          <div class="kv"><span>Goal</span>${esc(app.goal || "-")}</div><div class="kv"><span>Class type</span>${esc(app.preferredClassType || "-")}</div>
          <div class="kv"><span>Preferred schedule</span>${esc(app.preferredSchedule || "-")}</div>
          <div class="kv"><span>Preferred coach</span>${esc(app.preferredCoachName || "No preference")}</div><div class="kv"><span>Assigned coach</span>${esc(app.assignedCoachName || "-")}</div>
          <div class="kv"><span>Submitted</span>${dt(app.createdAt)}</div><div class="kv"><span>Notes</span>${esc(app.notes || "-")}</div>
        </div>
        <div class="actions">
          <select id="coach-${app.id}">${coachOptions(app.assignedCoachId || app.preferredCoachId || "")}</select>
          <button class="primary" type="button" onclick="assignCoach(${app.id})">Assign Coach</button>
          <button class="danger" type="button" onclick="rejectApplication(${app.id})">Reject</button>
        </div>
      </article>`).join("") : '<div class="muted">No applications found.</div>';
  }
  async function assignCoach(id){
    const coachId = document.getElementById(`coach-${id}`).value;
    if(!coachId) return alert("Choose a coach first.");
    const res = await fetch(`/api/admin/class-applications/${id}/assign`, { method:"PUT", headers:{ "Content-Type":"application/json", ...authHeaders }, body:JSON.stringify({ coachId }) });
    if(!res.ok){ const d=await res.json().catch(()=>({})); return alert(d.error || "Assign failed."); }
    loadApplications();
  }
  async function rejectApplication(id){
    if(!confirm("Reject this application?")) return;
    const res = await fetch(`/api/admin/class-applications/${id}/reject`, { method:"PUT", headers:authHeaders });
    if(!res.ok) return alert("Reject failed.");
    loadApplications();
  }
  statusFilter.addEventListener("change", loadApplications);
  loadCoaches().then(loadApplications);
</script>
</body>
</html>
