<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduChess - My Games</title>
  <link rel="stylesheet" href="css/chessboard-1.0.0.min.css">
  <style>
    :root {
      --bg: #070b14;
      --panel: rgba(15, 24, 39, 0.9);
      --panel-2: rgba(9, 15, 27, 0.94);
      --text: #f6f8ff;
      --muted: #aab4c4;
      --accent: #82bd4a;
      --accent-2: #f4c95d;
      --stroke: rgba(184, 199, 219, 0.16);
      --danger: #f87171;
      --shadow: 0 22px 54px rgba(0, 0, 0, 0.38);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px 1fr;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background:
        linear-gradient(90deg, rgba(7, 11, 20, 0.96), rgba(14, 22, 35, 0.9)),
        url("img/custom-chess/background.jpg") center bottom / cover fixed no-repeat;
    }
    .sidebar {
      background: rgba(9, 14, 23, 0.9);
      border-right: 1px solid var(--stroke);
      padding: 22px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      backdrop-filter: blur(16px);
    }
    .sidebar-logo, .nav-link {
      color: var(--text);
      text-decoration: none;
      border-radius: 10px;
      border: 1px solid transparent;
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      font-weight: 800;
      border-color: var(--stroke);
      background: rgba(255,255,255,0.05);
    }
    .sidebar-logo img { width: 36px; height: 36px; object-fit: contain; }
    .sidebar-nav, .sidebar-footer { display: grid; gap: 8px; }
    .sidebar-footer { margin-top: auto; border-top: 1px solid var(--stroke); padding-top: 12px; }
    .nav-section-title { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; margin: 8px 0 2px; }
    .nav-link { padding: 10px 12px; }
    .nav-link:hover, .nav-link.active { background: rgba(130, 189, 74, 0.14); border-color: rgba(130, 189, 74, 0.34); color: #d9ffae; }
    .sidebar-logout, button, .btn {
      min-height: 38px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
      padding: 9px 12px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .primary { background: linear-gradient(180deg, #94ca5c, #6ca340); color: #081207; border-color: rgba(148,202,92,.62); }
    .danger { border-color: rgba(248,113,113,.45); color: #fecaca; }
    main { padding: 24px; overflow: auto; }
    .topbar, .panel {
      background: linear-gradient(145deg, var(--panel), var(--panel-2));
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      border-radius: 12px;
    }
    .topbar { display: flex; justify-content: space-between; gap: 14px; align-items: center; padding: 16px; margin-bottom: 16px; flex-wrap: wrap; }
    h1, h2, h3 { margin: 0; }
    .muted { color: var(--muted); }
    .toolbar { display: grid; grid-template-columns: minmax(180px, 1fr) minmax(150px, 220px); gap: 10px; margin-bottom: 14px; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--stroke);
      border-radius: 8px;
      background: rgba(255,255,255,.05);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
      color-scheme: dark;
    }
    textarea { min-height: 110px; resize: vertical; }
    .games-table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 11px 10px; border-bottom: 1px solid var(--stroke); vertical-align: top; }
    th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }
    .game-name { font-weight: 800; }
    .moves-preview { max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--muted); }
    .action-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .empty {
      padding: 42px 20px;
      text-align: center;
      border: 1px dashed var(--stroke);
      border-radius: 12px;
      color: var(--muted);
      background: rgba(255,255,255,.03);
    }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(3, 8, 20, .72);
      backdrop-filter: blur(10px);
    }
    .modal.hidden { display: none; }
    .modal-card {
      width: min(980px, 100%);
      max-height: 92vh;
      overflow: auto;
      padding: 18px;
      border-radius: 12px;
      background: linear-gradient(145deg, rgba(18, 28, 45, .98), rgba(8, 13, 24, .98));
      border: 1px solid var(--stroke);
      box-shadow: 0 26px 80px rgba(0,0,0,.52);
    }
    .modal-head, .modal-actions { display: flex; justify-content: space-between; gap: 10px; align-items: center; flex-wrap: wrap; }
    .modal-actions { justify-content: flex-end; margin-top: 14px; }
    .detail-grid { display: grid; grid-template-columns: minmax(280px, 380px) 1fr; gap: 16px; margin-top: 14px; }
    #replayBoard { width: 100%; max-width: 380px; margin: 0 auto; }
    .meta-grid, .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 10px; }
    .kv { padding: 10px; border: 1px solid var(--stroke); border-radius: 8px; background: rgba(255,255,255,.04); }
    .kv span { display:block; color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    pre { white-space: pre-wrap; overflow: auto; padding: 12px; border-radius: 8px; background: rgba(0,0,0,.24); border: 1px solid var(--stroke); }
    .replay-indicator {
      margin-top: 10px;
      text-align: center;
      color: var(--accent-2);
      font-weight: 800;
      min-height: 22px;
    }
    .notation-panel {
      max-height: 360px;
      overflow: auto;
      border: 1px solid var(--stroke);
      border-radius: 10px;
      background: rgba(0,0,0,.18);
      margin-top: 10px;
    }
    .notation-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .notation-table th,
    .notation-table td {
      border-bottom: 1px solid rgba(184,199,219,.10);
      padding: 7px 8px;
      vertical-align: top;
    }
    .notation-table th:first-child,
    .notation-table td:first-child { width: 64px; color: var(--muted); text-align: right; }
    .move-cell {
      border-radius: 7px;
      padding: 6px 7px;
      cursor: pointer;
      min-height: 30px;
    }
    .move-cell:hover { background: rgba(255,255,255,.07); }
    .move-cell.active { background: rgba(130,189,74,.22); color: #d9ffae; outline: 1px solid rgba(130,189,74,.45); }
    .move-comments { display: grid; gap: 5px; margin-top: 6px; }
    .move-comment {
      border-left: 2px solid rgba(244,201,93,.7);
      background: rgba(244,201,93,.08);
      border-radius: 0 7px 7px 0;
      padding: 6px 8px;
      font-size: 12px;
      color: rgba(246,248,255,.92);
    }
    .comment-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--accent-2);
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 3px;
    }
    .comment-actions { display: inline-flex; gap: 4px; }
    .comment-actions button { min-height: 24px; padding: 2px 6px; font-size: 11px; }
    @media (max-width: 900px) {
      body { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .toolbar, .detail-grid { grid-template-columns: 1fr; }
      main { padding: 16px; }
    }
  </style>
</head>
<body data-active-nav="my-games">
  <aside class="sidebar">
    <a class="sidebar-logo" href="dashboard.html"><img src="logo.png" alt="EduChess">EduChess</a>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-footer"></div>
  </aside>

  <main>
    <div class="topbar">
      <div>
        <h1>My Games</h1>
        <div class="muted">Your saved analysis games, PGN metadata, notes, and replay.</div>
      </div>
      <a class="btn primary" href="analysis.html">Analyze New Game</a>
    </div>

    <section class="panel" style="padding:16px;">
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="Search by game name or player">
        <select id="resultFilter">
          <option value="">All results</option>
          <option value="UNKNOWN">Unknown</option>
          <option value="WHITE_WIN">White wins</option>
          <option value="BLACK_WIN">Black wins</option>
          <option value="DRAW">Draw</option>
        </select>
      </div>
      <div id="gamesContainer"></div>
    </section>
  </main>

  <div class="modal hidden" id="viewModal">
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="viewTitle">Saved Game</h2>
        <button type="button" onclick="closeModal('viewModal')">Close</button>
      </div>
      <div class="detail-grid">
        <div>
          <div id="replayBoard"></div>
          <div class="action-row" style="justify-content:center;margin-top:10px;">
            <button type="button" onclick="goReplay(0)">First</button>
            <button type="button" onclick="stepReplay(-1)">Previous</button>
            <button type="button" onclick="stepReplay(1)">Next</button>
            <button type="button" onclick="goReplayLast()">Last</button>
          </div>
          <div class="replay-indicator" id="replayIndicator">Starting position</div>
        </div>
        <div>
          <div class="meta-grid" id="viewMeta"></div>
          <div class="modal-actions" style="justify-content:space-between;margin-top:12px;">
            <h3>Notation</h3>
            <button type="button" onclick="addCommentToSelected()">Add comment</button>
          </div>
          <div class="notation-panel" id="notationPanel"></div>
          <h3 style="margin-top:14px;">Notes</h3>
          <pre id="viewNotes"></pre>
          <h3 style="margin-top:14px;">PGN / Moves</h3>
          <pre id="viewPgn"></pre>
          <div class="modal-actions">
            <button class="primary" type="button" id="viewAnalyzeBtn">Analyze this game</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal hidden" id="editModal">
    <div class="modal-card">
      <div class="modal-head">
        <h2>Edit Saved Game</h2>
        <button type="button" onclick="closeModal('editModal')">Close</button>
      </div>
      <div class="form-grid">
        <label>Game name<input id="editGameName"></label>
        <label>Result<select id="editResult">
          <option value="UNKNOWN">Unknown</option>
          <option value="WHITE_WIN">White wins</option>
          <option value="BLACK_WIN">Black wins</option>
          <option value="DRAW">Draw</option>
        </select></label>
        <label>White player<input id="editWhite"></label>
        <label>Black player<input id="editBlack"></label>
        <label>Event name<input id="editEvent"></label>
        <label>Round<input id="editRound"></label>
        <label>Venue / Site<input id="editSite"></label>
        <label>Game date<input id="editDate" type="date"></label>
      </div>
      <label style="display:block;margin-top:10px;">Notes<textarea id="editNotes"></textarea></label>
      <label style="display:block;margin-top:10px;">PGN<textarea id="editPgn"></textarea></label>
      <label style="display:block;margin-top:10px;">Moves JSON<textarea id="editMoves"></textarea></label>
      <div class="modal-actions">
        <button class="primary" type="button" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="lib/chess.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="lib/chessboard-1.0.0.min.js"></script>
  <script src="js/role-nav.js"></script>
  <script>
    const token = localStorage.getItem("authToken");
    if (!token) window.location.href = "index.html";
    const authHeaders = { Authorization: "Bearer " + token };
    let games = [];
    let editingId = null;
    let currentViewGame = null;
    let replayBoard = null;
    let replayMoves = [];
    let replayIndex = 0;
    let moveAnnotations = {};
    const currentRole = (localStorage.getItem("userRole") || "STUDENT").toUpperCase();

    const escapeHtml = value => String(value ?? "").replace(/[&<>"']/g, ch => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[ch]));
    const resultText = result => ({
      WHITE_WIN: "1-0", BLACK_WIN: "0-1", DRAW: "1/2-1/2", UNKNOWN: "*"
    }[result] || "*");
    const fmtDateTime = value => value ? String(value).replace("T", " ").slice(0, 16) : "-";
    const movesPreview = game => {
      try {
        const moves = normalizeMoves(game);
        if (Array.isArray(moves) && moves.length) return moves.map(m => m.san || m.uci || "").filter(Boolean).slice(0, 12).join(" ");
      } catch (_) {}
      return (game.pgn || "").split(/\s+/).filter(Boolean).slice(-18).join(" ");
    };
    const withHeaders = game => {
      const pgn = game.pgn || "";
      const movesText = buildPgnMoves(normalizeMoves(game), parseAnnotations(game.moveAnnotationsJson));
      if (pgn.includes("[Event ")) {
        const headers = (pgn.match(/(?:\[[^\]]+\]\s*)+/) || [""])[0].trim();
        return `${headers}\n\n${movesText}`;
      }
      const date = game.gameDate ? game.gameDate.replace(/-/g, ".") : "????.??.??";
      return [
        `[Event "${pgnEscape(game.eventName || game.gameName || "?")}"]`,
        `[Site "${pgnEscape(game.site || "?")}"]`,
        `[Date "${date}"]`,
        `[Round "${pgnEscape(game.round || "?")}"]`,
        `[White "${pgnEscape(game.whitePlayer || "?")}"]`,
        `[Black "${pgnEscape(game.blackPlayer || "?")}"]`,
        `[Result "${resultText(game.result)}"]`,
        "",
        movesText || pgn
      ].join("\n");
    };
    const pgnEscape = value => String(value || "").replace(/\\/g, "\\\\").replace(/"/g, '\\"');
    const commentEscape = value => String(value || "").replace(/[{}]/g, "").trim();

    function parseAnnotations(raw) {
      try {
        const parsed = raw ? JSON.parse(raw) : {};
        return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
      } catch (_) {
        return {};
      }
    }

    function parsePgnSanMoves(pgn) {
      let body = String(pgn || "").replace(/\r/g, "\n");
      body = body.replace(/\[[^\]]*\]/g, " ");
      body = body.replace(/\{[^}]*\}/g, " ");
      while (/\([^()]*\)/.test(body)) body = body.replace(/\([^()]*\)/g, " ");
      body = body.replace(/;[^\n]*/g, " ");
      body = body.replace(/\$\d+/g, " ");
      body = body.replace(/\d+\.(\.\.)?/g, " ");
      return body.split(/\s+/)
        .map(t => t.trim())
        .filter(t => t && !["1-0", "0-1", "1/2-1/2", "*"].includes(t));
    }

    function rebuildFromSanTokens(tokens) {
      const chess = new Chess();
      const moves = [];
      tokens.forEach(token => {
        const fenBefore = chess.fen();
        let move = null;
        try { move = chess.move(token, { sloppy: true }); } catch (_) { move = null; }
        if (!move) return;
        moves.push({
          ply: moves.length + 1,
          moveNumber: Math.floor(moves.length / 2) + 1,
          san: move.san,
          uci: `${move.from}${move.to}${move.promotion || ""}`,
          color: move.color,
          fenBefore,
          fenAfter: chess.fen()
        });
      });
      return moves;
    }

    function normalizeFlatPlyMoves(moves) {
      return moves.map((m, idx) => ({
        ...m,
        ply: idx + 1,
        moveNumber: Math.floor(idx / 2) + 1,
        san: m.san || m.move || "",
        uci: m.uci || "",
        color: m.color || (idx % 2 === 0 ? "w" : "b"),
        fenBefore: m.fenBefore || "",
        fenAfter: m.fenAfter || ""
      }));
    }

    function normalizeMoves(game) {
      let rawMoves = [];
      try {
        const parsed = JSON.parse(game.movesJson || "[]");
        if (Array.isArray(parsed)) rawMoves = parsed;
      } catch (_) {}

      if (rawMoves.length && rawMoves.every(m => m && typeof m === "object" && m.fenAfter && (m.san || m.uci || m.move) && !m.white && !m.black)) {
        return normalizeFlatPlyMoves(rawMoves);
      }

      if (rawMoves.length) {
        const tokens = rawMoves.flatMap(m => {
          if (typeof m === "string") return [m];
          if (m && typeof m === "object") return [m.san, m.white, m.black, m.move].filter(Boolean);
          return [];
        });
        const rebuilt = rebuildFromSanTokens(tokens);
        if (rebuilt.length) return rebuilt;
      }

      return rebuildFromSanTokens(parsePgnSanMoves(game.pgn || ""));
    }

    function replayStartPosition() {
      return replayMoves[0]?.fenBefore || currentViewGame?.fen || new Chess().fen();
    }

    function replayPositionAt(index) {
      return index === 0 ? replayStartPosition() : replayMoves[index - 1]?.fenAfter || replayStartPosition();
    }

    function buildPgnMoves(moves, annotations = {}) {
      if (!moves.length) return resultText(currentViewGame?.result);
      let pgn = "";
      moves.forEach((move, idx) => {
        const ply = idx + 1;
        if (move.color === "w") pgn += `${Math.floor(idx / 2) + 1}. `;
        else if (idx === 0) pgn += "1... ";
        pgn += `${move.san || move.uci || ""} `;
        const comments = annotations[String(ply)] || [];
        comments.forEach(comment => {
          if (comment?.text) pgn += `{${commentEscape(comment.text)}} `;
        });
      });
      return `${pgn}${resultText(currentViewGame?.result)}`.trim();
    }

    async function loadGames() {
      const res = await fetch("/api/games/my", { headers: authHeaders });
      const data = await res.json().catch(() => []);
      if (!res.ok) throw new Error(data.error || "Could not load saved games.");
      games = Array.isArray(data) ? data : [];
      renderGames();
    }

    function renderGames() {
      const q = document.getElementById("searchInput").value.trim().toLowerCase();
      const result = document.getElementById("resultFilter").value;
      const filtered = games.filter(g => {
        const text = [g.gameName, g.whitePlayer, g.blackPlayer, g.eventName, g.site].join(" ").toLowerCase();
        return (!q || text.includes(q)) && (!result || g.result === result);
      });
      const container = document.getElementById("gamesContainer");
      if (!filtered.length) {
        container.innerHTML = '<div class="empty">No saved games yet. Analyze a game and save it here.</div>';
        return;
      }
      container.innerHTML = `<table class="games-table"><thead><tr>
        <th>Game</th><th>Players</th><th>Result</th><th>Event</th><th>Saved</th><th>Updated</th><th>Moves</th><th>Actions</th>
      </tr></thead><tbody>${filtered.map(g => `<tr>
        <td><div class="game-name">${escapeHtml(g.gameName || "Untitled Game")}</div><div class="muted">${escapeHtml(g.site || "")}</div></td>
        <td>${escapeHtml(g.whitePlayer || "White")} vs ${escapeHtml(g.blackPlayer || "Black")}</td>
        <td>${resultText(g.result)}</td>
        <td>${escapeHtml(g.eventName || "-")}<div class="muted">${escapeHtml(g.round || "")}${g.gameDate ? " | " + escapeHtml(g.gameDate) : ""}</div></td>
        <td>${fmtDateTime(g.createdAt)}</td>
        <td>${fmtDateTime(g.updatedAt)}</td>
        <td><div class="moves-preview">${escapeHtml(movesPreview(g))}</div></td>
        <td><div class="action-row">
          <button type="button" onclick="viewGame(${g.id})">View</button>
          <button type="button" onclick="editGame(${g.id})">Edit</button>
          <button type="button" onclick="analyzeGame(${g.id})">Analyze</button>
          <button type="button" class="danger" onclick="deleteGame(${g.id})">Delete</button>
        </div></td>
      </tr>`).join("")}</tbody></table>`;
    }

    function gameById(id) { return games.find(g => Number(g.id) === Number(id)); }

    function viewGame(id) {
      const g = gameById(id);
      if (!g) return;
      currentViewGame = g;
      moveAnnotations = parseAnnotations(g.moveAnnotationsJson);
      document.getElementById("viewTitle").textContent = g.gameName || "Untitled Game";
      document.getElementById("viewMeta").innerHTML = [
        ["White", g.whitePlayer || "White"], ["Black", g.blackPlayer || "Black"], ["Result", resultText(g.result)],
        ["Event", g.eventName || "-"], ["Round", g.round || "-"], ["Site", g.site || "-"],
        ["Game date", g.gameDate || "-"], ["Saved", fmtDateTime(g.createdAt)], ["Updated", fmtDateTime(g.updatedAt)]
      ].map(([k, v]) => `<div class="kv"><span>${escapeHtml(k)}</span>${escapeHtml(v)}</div>`).join("");
      document.getElementById("viewNotes").textContent = g.notes || "-";
      document.getElementById("viewPgn").textContent = withHeaders(g);
      document.getElementById("viewAnalyzeBtn").onclick = () => analyzeGame(id);
      prepareReplay(g);
      renderNotation();
      openModal("viewModal");
    }

    function prepareReplay(g) {
      replayMoves = normalizeMoves(g);
      replayIndex = 0;
      setTimeout(() => {
        if (!replayBoard) replayBoard = Chessboard("replayBoard", { position: replayPositionAt(0), pieceTheme: "img/pieces/{piece}.svg" });
        else replayBoard.position(replayPositionAt(0), false);
        updateReplayView();
      }, 30);
    }
    function stepReplay(delta) { goReplay(replayIndex + delta); }
    function goReplayLast() { goReplay(replayMoves.length); }
    function goReplay(idx) {
      replayIndex = Math.max(0, Math.min(idx, replayMoves.length));
      if (replayBoard) replayBoard.position(replayPositionAt(replayIndex), false);
      updateReplayView();
    }

    function replayLabel() {
      if (replayIndex <= 0) return "Starting position";
      const move = replayMoves[replayIndex - 1];
      if (!move) return "Current position";
      return move.color === "b" ? `Move ${move.moveNumber}... ${move.san}` : `Move ${move.moveNumber}. ${move.san}`;
    }

    function updateReplayView() {
      document.getElementById("replayIndicator").textContent = replayLabel();
      document.querySelectorAll(".move-cell").forEach(cell => {
        cell.classList.toggle("active", Number(cell.dataset.ply) === replayIndex);
      });
      document.querySelector(".move-cell.active")?.scrollIntoView({ block: "nearest" });
    }

    function renderNotation() {
      const rows = [];
      for (let i = 0; i < replayMoves.length; i += 2) {
        const white = replayMoves[i] || null;
        const black = replayMoves[i + 1] || null;
        rows.push(`<tr>
          <td>${Math.floor(i / 2) + 1}</td>
          <td>${renderMoveCell(white)}</td>
          <td>${renderMoveCell(black)}</td>
        </tr>`);
      }
      document.getElementById("notationPanel").innerHTML = replayMoves.length
        ? `<table class="notation-table"><thead><tr><th>Move No</th><th>White</th><th>Black</th></tr></thead><tbody>${rows.join("")}</tbody></table>`
        : '<div class="empty" style="padding:22px 12px;">No replayable moves found in this game.</div>';
      updateReplayView();
    }

    function renderMoveCell(move) {
      if (!move) return "";
      const ply = move.ply;
      const comments = moveAnnotations[String(ply)] || [];
      return `<div class="move-cell" data-ply="${ply}" onclick="goReplay(${ply})">
        <strong>${escapeHtml(move.san || move.uci || "")}</strong>
        ${comments.length ? `<div class="move-comments">${comments.map((comment, idx) => renderComment(ply, comment, idx)).join("")}</div>` : ""}
      </div>`;
    }

    function renderComment(ply, comment, idx) {
      const role = (comment.authorRole || "STUDENT").toUpperCase();
      const own = role === currentRole;
      return `<div class="move-comment">
        <div class="comment-head">
          <span>${role === "COACH" ? "Coach" : "Student"}</span>
          ${own ? `<span class="comment-actions">
            <button type="button" onclick="event.stopPropagation(); editComment(${ply}, ${idx})">Edit</button>
            <button type="button" onclick="event.stopPropagation(); deleteComment(${ply}, ${idx})">Delete</button>
          </span>` : ""}
        </div>
        <div>${escapeHtml(comment.text || "")}</div>
      </div>`;
    }

    async function addCommentToSelected() {
      if (!currentViewGame || replayIndex <= 0) return alert("Select a move first.");
      const text = prompt("Comment for selected move:");
      if (!text || !text.trim()) return;
      const key = String(replayIndex);
      moveAnnotations[key] = moveAnnotations[key] || [];
      moveAnnotations[key].push({ authorRole: currentRole, text: text.trim(), createdAt: new Date().toISOString() });
      await saveAnnotations();
    }

    async function editComment(ply, idx) {
      const key = String(ply);
      const comment = moveAnnotations[key]?.[idx];
      if (!comment || (comment.authorRole || "STUDENT").toUpperCase() !== currentRole) return;
      const text = prompt("Edit comment:", comment.text || "");
      if (!text || !text.trim()) return;
      comment.text = text.trim();
      comment.updatedAt = new Date().toISOString();
      await saveAnnotations();
    }

    async function deleteComment(ply, idx) {
      const key = String(ply);
      const comment = moveAnnotations[key]?.[idx];
      if (!comment || (comment.authorRole || "STUDENT").toUpperCase() !== currentRole) return;
      if (!confirm("Delete this comment?")) return;
      moveAnnotations[key].splice(idx, 1);
      if (!moveAnnotations[key].length) delete moveAnnotations[key];
      await saveAnnotations();
    }

    async function saveAnnotations() {
      if (!currentViewGame) return;
      const payload = { ...currentViewGame, moveAnnotationsJson: JSON.stringify(moveAnnotations) };
      payload.pgn = withHeaders(payload);
      const res = await fetch(`/api/games/${currentViewGame.id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", ...authHeaders },
        body: JSON.stringify(payload)
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) return alert(data.error || "Could not save comment.");
      currentViewGame = data;
      const idx = games.findIndex(g => Number(g.id) === Number(data.id));
      if (idx >= 0) games[idx] = data;
      moveAnnotations = parseAnnotations(data.moveAnnotationsJson);
      document.getElementById("viewPgn").textContent = withHeaders(data);
      renderNotation();
    }

    function editGame(id) {
      const g = gameById(id);
      if (!g) return;
      editingId = id;
      document.getElementById("editGameName").value = g.gameName || "";
      document.getElementById("editResult").value = g.result || "UNKNOWN";
      document.getElementById("editWhite").value = g.whitePlayer || "";
      document.getElementById("editBlack").value = g.blackPlayer || "";
      document.getElementById("editEvent").value = g.eventName || "";
      document.getElementById("editRound").value = g.round || "";
      document.getElementById("editSite").value = g.site || "";
      document.getElementById("editDate").value = g.gameDate || "";
      document.getElementById("editNotes").value = g.notes || "";
      document.getElementById("editPgn").value = withHeaders(g);
      document.getElementById("editMoves").value = g.movesJson || "";
      openModal("editModal");
    }

    async function saveEdit() {
      const existing = gameById(editingId);
      const payload = {
        ...existing,
        gameName: document.getElementById("editGameName").value.trim() || null,
        result: document.getElementById("editResult").value,
        whitePlayer: document.getElementById("editWhite").value.trim() || null,
        blackPlayer: document.getElementById("editBlack").value.trim() || null,
        eventName: document.getElementById("editEvent").value.trim() || null,
        round: document.getElementById("editRound").value.trim() || null,
        site: document.getElementById("editSite").value.trim() || null,
        gameDate: document.getElementById("editDate").value || null,
        notes: document.getElementById("editNotes").value.trim() || null,
        pgn: document.getElementById("editPgn").value,
        movesJson: document.getElementById("editMoves").value,
        moveAnnotationsJson: existing.moveAnnotationsJson || "{}"
      };
      const res = await fetch(`/api/games/${editingId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", ...authHeaders },
        body: JSON.stringify(payload)
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) return alert(data.error || "Could not save game.");
      closeModal("editModal");
      await loadGames();
    }

    function analyzeGame(id) {
      window.location.href = `analysis.html?gameId=${encodeURIComponent(id)}`;
    }

    async function deleteGame(id) {
      if (!confirm("Delete this saved game?")) return;
      const res = await fetch(`/api/games/${id}`, { method: "DELETE", headers: authHeaders });
      if (!res.ok) return alert("Could not delete game.");
      await loadGames();
    }

    function openModal(id) { document.getElementById(id).classList.remove("hidden"); }
    function closeModal(id) { document.getElementById(id).classList.add("hidden"); }

    document.getElementById("searchInput").addEventListener("input", renderGames);
    document.getElementById("resultFilter").addEventListener("change", renderGames);
    loadGames().catch(err => {
      document.getElementById("gamesContainer").innerHTML = `<div class="empty">${escapeHtml(err.message)}</div>`;
    });
  </script>
</body>
</html>
